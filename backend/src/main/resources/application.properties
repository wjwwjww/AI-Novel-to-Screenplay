# Application settings
server.port=8080
spring.application.name=backend

# H2 Database settings (Persistent file-based database)
spring.datasource.url=jdbc:h2:file:./db/noveldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console configuration (for debugging / viewing database)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# AI API Configurations (Default values, can be overridden by frontend requests)
# You can set these to OpenAI, DeepSeek, SiliconFlow, or any OpenAI-compatible API.
ai.api.url=https://api.deepseek.com
ai.api.key=your-api-key-here
ai.model=deepseek-chat
